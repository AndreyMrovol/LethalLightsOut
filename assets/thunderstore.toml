[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "mrov"
name = "LightsOut"
description = "Disables items' lights in the ship to improve FPS"
websiteUrl = "https://github.com/AndreyMrovol/LethalLightsOut"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"
mrov-MrovLib = "0.4.2"

[build]
icon = "../icon.png"
readme = "../README.md"
outdir = "../LightsOut/dist"

[[build.copy]]
source = "../LightsOut/bin/Release/netstandard2.1/LightsOut.dll"
target = "/"

[[build.copy]]
source = "../LICENSE.md"
target = "/"

[publish]
communities = [ "lethal-company", ]